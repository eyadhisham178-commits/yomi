<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="يومي">
<title>يومي ⏱</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #0A0A0F;
    --card: #0F0F1A;
    --border: #1E1E3A;
    --text: #E8E8F0;
    --muted: #555;
    --accent1: #FF6B35;
    --accent2: #FFE66D;
    --green: #06D6A0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 20px 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 28px; }
  .header-label { font-size: 10px; letter-spacing: 4px; color: #333; margin-bottom: 6px; }
  .header-time { font-size: 42px; font-weight: 900; background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
  .header-sub { font-size: 11px; color: #333; margin-top: 2px; }

  /* DAY BAR */
  .day-bar-wrap { margin-bottom: 28px; }
  .day-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .day-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .day-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent1), var(--accent2)); border-radius: 4px; transition: width 1s linear; }
  .day-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #444; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ACTIVE TASK */
  .active-box { border-radius: 14px; padding: 18px; margin-bottom: 20px; text-align: center; }
  .active-label { font-size: 10px; letter-spacing: 3px; margin-bottom: 6px; }
  .active-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  .active-timer { font-size: 50px; font-weight: 900; letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .active-total { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .active-stop { margin-top: 12px; background: transparent; padding: 8px 22px; border-radius: 8px; cursor: pointer; font-size: 12px; letter-spacing: 2px; font-family: inherit; }

  /* ADD TASK */
  .add-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
  .add-label { font-size: 10px; color: #333; letter-spacing: 3px; margin-bottom: 14px; }
  .add-row { display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap; }
  .add-input { flex: 1; min-width: 120px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
  .add-num { width: 54px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 14px; text-align: center; font-family: inherit; outline: none; -moz-appearance: textfield; }
  .add-num::-webkit-outer-spin-button, .add-num::-webkit-inner-spin-button { -webkit-appearance: none; }
  .add-sep { color: #333; font-size: 20px; display: flex; align-items: center; }
  .add-btn { background: linear-gradient(135deg, var(--accent1), var(--accent2)); border: none; color: #0A0A0F; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 14px; font-family: inherit; white-space: nowrap; }
  .add-btn:disabled { background: var(--border); color: #333; cursor: not-allowed; }
  .add-hint { font-size: 11px; margin-top: 10px; }

  /* TASK CARD */
  .task { border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid; transition: border-color 0.3s, background 0.3s; }
  .task-inner { display: flex; align-items: center; gap: 10px; }
  .task-num { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #0A0A0F; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-name.done { text-decoration: line-through; color: #444; }
  .task-prog { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .task-prog-fill { height: 100%; border-radius: 2px; transition: width 1s linear; }
  .task-meta { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; color: var(--muted); }
  .task-remain { font-weight: bold; }
  .task-btns { display: flex; gap: 5px; flex-shrink: 0; }
  .task-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; background: transparent; font-family: inherit; }

  /* EMPTY */
  .empty { text-align: center; color: #2A2A4A; padding: 40px; font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* DONE */
  .done-box { text-align: center; margin-top: 24px; padding: 20px; background: #06D6A010; border: 1px solid var(--green); border-radius: 14px; }

  /* INSTALL BANNER */
  .install-banner { position: fixed; bottom: 0; left: 0; right: 0; background: #0F0F1A; border-top: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 100; max-width: 480px; margin: 0 auto; }
  .install-text { font-size: 12px; color: var(--muted); flex: 1; }
  .install-text strong { color: var(--text); display: block; font-size: 13px; margin-bottom: 2px; }
  .install-btn { background: linear-gradient(135deg, var(--accent1), var(--accent2)); border: none; color: #0A0A0F; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 13px; font-family: inherit; white-space: nowrap; }
  .install-close { background: transparent; border: none; color: #333; font-size: 18px; cursor: pointer; padding: 4px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.8} }
  .pulsing { animation: pulse 2s infinite; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">SYSTEM · يومك كله</div>
  <div class="header-time">24:00:00</div>
  <div class="header-sub">استغل كل ثانية</div>
</div>

<div class="day-bar-wrap">
  <div class="day-bar-labels">
    <span id="elapsed-label">المُنجز: 00:00:00</span>
    <span id="remaining-label">المتبقي: 24:00:00</span>
  </div>
  <div class="day-bar"><div class="day-bar-fill" id="day-fill" style="width:0%"></div></div>
  <div class="day-legend" id="legend"></div>
</div>

<div id="active-box" style="display:none"></div>

<div class="add-box">
  <div class="add-label">+ مهمة جديدة</div>
  <div class="add-row">
    <input class="add-input" id="task-name" placeholder="اسم المهمة..." type="text">
    <input class="add-num" id="task-h" placeholder="س" type="number" min="0" max="23">
    <div class="add-sep">:</div>
    <input class="add-num" id="task-m" placeholder="د" type="number" min="0" max="59">
    <button class="add-btn" id="add-btn" onclick="addTask()">أضف</button>
  </div>
  <div class="add-hint" id="add-hint"></div>
</div>

<div id="tasks-list"></div>
<div id="done-msg" style="display:none" class="done-box">
  <div style="font-size:32px">🔥</div>
  <div style="color:var(--green);font-weight:bold;margin-top:8px">استغليت يومك كله!</div>
</div>

<div class="install-banner" id="install-banner" style="display:none">
  <div class="install-text">
    <strong>📲 نزّله على موبايلك</strong>
    شغّله زي app حقيقي من غير نت
  </div>
  <button class="install-btn" id="install-btn">نزّل</button>
  <button class="install-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<script>
const TOTAL = 24 * 3600;
const COLORS = [
  { bg: "#FF6B35", light: "#FF6B3518" },
  { bg: "#4ECDC4", light: "#4ECDC418" },
  { bg: "#FFE66D", light: "#FFE66D18" },
  { bg: "#A855F7", light: "#A855F718" },
  { bg: "#06D6A0", light: "#06D6A018" },
  { bg: "#EF476F", light: "#EF476F18" },
  { bg: "#118AB2", light: "#118AB218" },
  { bg: "#F77F00", light: "#F77F0018" },
];

let tasks = JSON.parse(localStorage.getItem("yomi-tasks") || "[]");
let activeId = null;
let ticker = null;

function save() { localStorage.setItem("yomi-tasks", JSON.stringify(tasks)); }

function fmt(s) {
  const h = String(Math.floor(s / 3600)).padStart(2, "0");
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
  const sec = String(s % 60).padStart(2, "0");
  return `${h}:${m}:${sec}`;
}

function fmtH(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h === 0) return `${m}د`;
  if (m === 0) return `${h}س`;
  return `${h}س ${m}د`;
}

function allocated() { return tasks.reduce((a, t) => a + t.total, 0); }
function elapsed() { return tasks.reduce((a, t) => a + (t.total - t.rem), 0); }

function addTask() {
  const name = document.getElementById("task-name").value.trim();
  const h = parseInt(document.getElementById("task-h").value) || 0;
  const m = parseInt(document.getElementById("task-m").value) || 0;
  const secs = h * 3600 + m * 60;
  const left = TOTAL - allocated();
  if (!name || secs <= 0 || secs > left) return;
  tasks.push({ id: Date.now(), name, total: secs, rem: secs, color: COLORS[tasks.length % COLORS.length] });
  document.getElementById("task-name").value = "";
  document.getElementById("task-h").value = "";
  document.getElementById("task-m").value = "";
  save();
  render();
}

function toggleTask(id) {
  if (activeId === id) { activeId = null; }
  else { activeId = id; }
  startTicker();
  render();
}

function resetTask(id) {
  if (activeId === id) activeId = null;
  tasks = tasks.map(t => t.id === id ? { ...t, rem: t.total } : t);
  save(); render();
}

function deleteTask(id) {
  if (activeId === id) activeId = null;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function startTicker() {
  clearInterval(ticker);
  if (activeId === null) return;
  ticker = setInterval(() => {
    tasks = tasks.map(t => {
      if (t.id === activeId) {
        if (t.rem <= 0) { activeId = null; clearInterval(ticker); return t; }
        return { ...t, rem: t.rem - 1 };
      }
      return t;
    });
    save(); render();
  }, 1000);
}

function render() {
  const el = elapsed();
  const pct = (el / TOTAL) * 100;
  document.getElementById("day-fill").style.width = pct + "%";
  document.getElementById("elapsed-label").textContent = "المُنجز: " + fmt(el);
  document.getElementById("remaining-label").textContent = "المتبقي: " + fmt(TOTAL - el);

  // legend
  const leg = document.getElementById("legend");
  const left = TOTAL - allocated();
  leg.innerHTML = tasks.map(t =>
    `<div class="legend-item"><div class="legend-dot" style="background:${t.color.bg}"></div><span>${t.name}</span></div>`
  ).join("") + (left > 0 ? `<div class="legend-item"><div class="legend-dot" style="background:var(--border);border:1px solid #333"></div><span>غير محدد (${fmtH(left)})</span></div>` : "");

  // active box
  const ab = document.getElementById("active-box");
  const at = tasks.find(t => t.id === activeId);
  if (at) {
    ab.style.display = "block";
    ab.className = "active-box pulsing";
    ab.style.background = at.color.light;
    ab.style.border = `1px solid ${at.color.bg}`;
    ab.innerHTML = `
      <div class="active-label" style="color:${at.color.bg}">▶ شغال دلوقتي</div>
      <div class="active-name">${at.name}</div>
      <div class="active-timer" style="color:${at.color.bg}">${fmt(at.rem)}</div>
      <div class="active-total">من ${fmtH(at.total)}</div>
      <button class="active-stop" style="border:1px solid ${at.color.bg};color:${at.color.bg}" onclick="toggleTask(${at.id})">⏸ وقّف</button>
    `;
  } else {
    ab.style.display = "none";
  }

  // add hint
  const hint = document.getElementById("add-hint");
  const rem = TOTAL - allocated();
  if (rem > 0) {
    hint.style.color = "var(--accent1)";
    hint.textContent = "⚡ متبقي للتوزيع: " + fmtH(rem);
  } else {
    hint.style.color = "var(--green)";
    hint.textContent = "✓ ممتاز! وزّعت الـ 24 ساعة كلها";
  }
  document.getElementById("add-btn").disabled = rem <= 0;

  // tasks list
  const list = document.getElementById("tasks-list");
  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">⏱</div>ابدأ بإضافة مهام يومك 👆</div>`;
  } else {
    list.innerHTML = tasks.map((t, i) => {
      const prog = ((t.total - t.rem) / t.total) * 100;
      const isActive = t.id === activeId;
      const isDone = t.rem === 0;
      return `
      <div class="task" style="background:${isActive ? t.color.light : 'var(--card)'};border-color:${isActive ? t.color.bg : 'var(--border)'}">
        <div class="task-inner">
          <div class="task-num" style="background:${t.color.bg}">${i + 1}</div>
          <div class="task-info">
            <div class="task-name ${isDone ? 'done' : ''}">${t.name}</div>
            <div class="task-prog"><div class="task-prog-fill" style="width:${prog}%;background:${t.color.bg}"></div></div>
            <div class="task-meta">
              <span>${fmtH(t.total - t.rem)} منجز</span>
              <span class="task-remain" style="color:${isDone ? 'var(--green)' : t.color.bg}">${isDone ? "✓ خلصت" : fmt(t.rem)}</span>
            </div>
          </div>
          <div class="task-btns">
            ${!isDone ? `<button class="task-btn" style="border-color:${t.color.bg};color:${isActive ? '#0A0A0F' : t.color.bg};background:${isActive ? t.color.bg : 'transparent'}" onclick="toggleTask(${t.id})">${isActive ? '⏸' : '▶'}</button>` : ''}
            <button class="task-btn" style="border-color:var(--border);color:#444" onclick="resetTask(${t.id})">↺</button>
            <button class="task-btn" style="border-color:var(--border);color:#333" onclick="deleteTask(${t.id})">✕</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  // done msg
  const allDone = tasks.length > 0 && tasks.every(t => t.rem === 0);
  document.getElementById("done-msg").style.display = allDone ? "block" : "none";
}

// allow enter key on inputs
document.getElementById("task-name").addEventListener("keydown", e => e.key === "Enter" && addTask());
document.getElementById("task-h").addEventListener("keydown", e => e.key === "Enter" && addTask());
document.getElementById("task-m").addEventListener("keydown", e => e.key === "Enter" && addTask());

// PWA Install
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").style.display = "flex";
});

document.getElementById("install-btn").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("install-banner").style.display = "none";
});

// iOS instructions
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.navigator.standalone === true;
if (isIOS && !isInStandalone) {
  const b = document.getElementById("install-banner");
  b.style.display = "flex";
  document.querySelector(".install-text").innerHTML = `
    <strong>📲 نزّله على موبايلك (iOS)</strong>
    اضغط <strong>□↑</strong> ثم "Add to Home Screen"
  `;
  document.getElementById("install-btn").style.display = "none";
}

render();
</script>

<!-- PWA Manifest inline -->
<script>
const manifest = {
  name: "يومي",
  short_name: "يومي",
  description: "مخطط يومك الـ 24 ساعة",
  start_url: ".",
  display: "standalone",
  background_color: "#0A0A0F",
  theme_color: "#0A0A0F",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230A0A0F'/><text y='.9em' font-size='80' x='10'>⏱</text></svg>", sizes: "any", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
const url = URL.createObjectURL(blob);
const link = document.createElement("link");
link.rel = "manifest"; link.href = url;
document.head.appendChild(link);
</script>

<!-- Service Worker for offline -->
<script>
if ("serviceWorker" in navigator) {
  const sw = `
    const CACHE = "yomi-v1";
    const FILES = ["/"];
    self.addEventListener("install", e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(FILES))));
    self.addEventListener("fetch", e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([sw], { type: "application/javascript" });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
</script>

</body>
</html>
